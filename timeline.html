<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recess — Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div id="nav-root"></div>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Balance Timeline</h1>
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm">
          <label class="text-xs text-slate-500 font-medium">From</label>
          <input type="date" id="range-start" class="text-sm border-none bg-transparent p-0 focus:outline-none text-slate-700">
          <span class="text-slate-300">—</span>
          <label class="text-xs text-slate-500 font-medium">To</label>
          <input type="date" id="range-end" class="text-sm border-none bg-transparent p-0 focus:outline-none text-slate-700">
        </div>
        <div class="flex gap-1 bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
          <button data-preset="3m"  class="preset-btn px-3 py-1 text-xs font-medium rounded-md text-slate-600 hover:bg-slate-100 transition-colors">3M</button>
          <button data-preset="6m"  class="preset-btn px-3 py-1 text-xs font-medium rounded-md text-slate-600 hover:bg-slate-100 transition-colors">6M</button>
          <button data-preset="1y"  class="preset-btn px-3 py-1 text-xs font-medium rounded-md bg-sky-600 text-white transition-colors">1Y</button>
          <button data-preset="2y"  class="preset-btn px-3 py-1 text-xs font-medium rounded-md text-slate-600 hover:bg-slate-100 transition-colors">2Y</button>
        </div>
      </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5 mb-5">
      <div class="flex flex-wrap gap-4 mb-4 items-center">
        <label class="flex items-center gap-1.5 cursor-pointer text-sm text-slate-600">
          <input type="checkbox" class="type-toggle" data-type="vacation" checked> <span class="w-3 h-3 rounded-full bg-sky-500 inline-block"></span> Annual Leave
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer text-sm text-slate-600">
          <input type="checkbox" class="type-toggle" data-type="sick" checked> <span class="w-3 h-3 rounded-full bg-violet-500 inline-block"></span> Sick Leave
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer text-sm text-slate-600">
          <input type="checkbox" class="type-toggle" data-type="comp" checked> <span class="w-3 h-3 rounded-full bg-amber-500 inline-block"></span> Comp Time
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer text-sm text-slate-400 ml-auto">
          <input type="checkbox" id="hide-planned"> Show without planned leave
        </label>
      </div>
      <div style="height:380px;position:relative;"><canvas id="timeline-chart"></canvas></div>
      <p class="text-xs text-slate-400 mt-3">Solid lines = actual. Dashed = projected (includes all planned leave).</p>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Balance at a Specific Date</h2>
      <div class="flex flex-wrap items-end gap-3">
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Date</label><input type="date" id="lookup-date" class="border border-slate-200 rounded-lg px-3 py-2 text-sm"></div>
        <button id="lookup-btn" class="bg-slate-700 hover:bg-slate-800 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">Look up</button>
      </div>
      <div id="lookup-result" class="mt-4 hidden">
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-sky-50 border border-sky-100 rounded-lg p-3 text-center"><p class="text-xs text-sky-600 font-medium mb-1">Annual Leave</p><p id="lu-vac" class="text-xl font-bold text-sky-700"></p></div>
          <div class="bg-violet-50 border border-violet-100 rounded-lg p-3 text-center"><p class="text-xs text-violet-600 font-medium mb-1">Sick Leave</p><p id="lu-sick" class="text-xl font-bold text-violet-700"></p></div>
          <div class="bg-amber-50 border border-amber-100 rounded-lg p-3 text-center"><p class="text-xs text-amber-600 font-medium mb-1">Comp Time</p><p id="lu-comp" class="text-xl font-bold text-amber-700"></p></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/accrual.js"></script>
  <script src="js/store.js"></script>
  <script src="js/holidays.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/charts.js"></script>
  <script>
    var profile = RC.getProfile();
    if (!RC.requireProfile(profile)) { /* redirecting */ }
    else {

    var chart = null;
    var today = RC.todayISO();

    function setPreset(key) {
      var now = RC.parseDate(today);
      var start, end;
      if      (key === '3m') { start = RC.addDays(now,-90);  end = RC.addDays(now,90);  }
      else if (key === '6m') { start = RC.addDays(now,-90);  end = RC.addDays(now,180); }
      else if (key === '2y') { start = RC.addDays(now,-180); end = RC.addDays(now,730); }
      else                   { start = RC.addDays(now,-90);  end = RC.addDays(now,275); }
      document.getElementById('range-start').value = RC.formatDate(start);
      document.getElementById('range-end').value   = RC.formatDate(end);
      document.querySelectorAll('.preset-btn').forEach(function(b) {
        b.classList.toggle('bg-sky-600', b.dataset.preset === key);
        b.classList.toggle('text-white',   b.dataset.preset === key);
        b.classList.toggle('text-slate-600', b.dataset.preset !== key);
      });
    }

    function renderChart() {
      var startStr = document.getElementById('range-start').value;
      var endStr   = document.getElementById('range-end').value;
      if (!startStr || !endStr) return;

      var days    = Math.abs((new Date(endStr) - new Date(startStr)) / 86400000);
      var step    = Math.max(Math.ceil(days / 100), 3);
      var history = RC.getBalanceHistory(profile, startStr, endStr, step);

      var visible     = Array.from(document.querySelectorAll('.type-toggle:checked')).map(function(cb) { return cb.dataset.type; });
      var hidePlanned = document.getElementById('hide-planned').checked;
      var result      = RC.buildTimelineDatasets(history, today);
      var labels      = result.labels;
      var datasets    = result.datasets.filter(function(ds) {
        var lt = ds.label.split(' (')[0].toLowerCase();
        return visible.includes(lt);
      });

      if (hidePlanned) {
        var p2 = Object.assign({}, profile, { transactions: profile.transactions.filter(function(t) { return !t.planned; }) });
        var h2 = RC.getBalanceHistory(p2, startStr, endStr, step);
        var colors = { vacation:'rgba(14,165,233,0.45)', sick:'rgba(139,92,246,0.45)', comp:'rgba(245,158,11,0.45)' };
        visible.forEach(function(lt) {
          datasets.push({
            label: lt + ' (w/o planned)',
            data: h2.map(function(p) { return +((p.balances[lt]||0)).toFixed(1); }),
            borderColor: colors[lt]||'rgba(100,116,139,0.4)',
            borderWidth: 1.5, borderDash: [3,3], pointRadius: 0, fill: false, tension: 0.3
          });
        });
      }

      var opts = RC.timelineChartOptions(profile.settings.displayUnits);
      if (chart) { chart.data.labels = labels; chart.data.datasets = datasets; chart.options = opts; chart.update(); }
      else { chart = new Chart(document.getElementById('timeline-chart'), { type:'line', data:{ labels:labels, datasets:datasets }, options:opts }); }
    }

    document.querySelectorAll('.preset-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { setPreset(btn.dataset.preset); renderChart(); });
    });
    document.getElementById('range-start').addEventListener('change', renderChart);
    document.getElementById('range-end').addEventListener('change', renderChart);
    document.querySelectorAll('.type-toggle').forEach(function(cb) { cb.addEventListener('change', renderChart); });
    document.getElementById('hide-planned').addEventListener('change', renderChart);

    document.getElementById('lookup-btn').addEventListener('click', function() {
      var d = document.getElementById('lookup-date').value;
      if (!d) return;
      var bal = RC.calculateBalance(profile, d);
      document.getElementById('lu-vac').textContent  = RC.fmtHours(bal.vacation||0, profile);
      document.getElementById('lu-sick').textContent = RC.fmtHours(bal.sick||0, profile);
      document.getElementById('lu-comp').textContent = RC.fmtHours(bal.comp||0, profile);
      document.getElementById('lookup-result').classList.remove('hidden');
    });

    setPreset('1y');
    renderChart();
    } // end else
  </script>
</body>
</html>
